<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mine Deep — 3D Mining Simulator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>">
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }}
  </script>
</head>
<body>
  <div id="game">
    <div id="crosshair">+</div>

    <div id="hud">
      <div id="hud-money">$0</div>
      <div id="hud-depth">Surface</div>
      <div id="hud-tool">⛏ Wood Pickaxe</div>
    </div>

    <div id="hotbar"></div>

    <div id="mining-bar" class="hidden">
      <div id="mining-fill"></div>
    </div>

    <div id="shop-overlay" class="hidden">
      <div class="shop-panel">
        <h2>⛏ MINING SHOP</h2>
        <div class="shop-cols">
          <div class="shop-section">
            <h3>SELL ORES</h3>
            <div id="sell-list"></div>
            <button id="sell-all-btn" class="shop-btn sell">SELL ALL ORES</button>
          </div>
          <div class="shop-section">
            <h3>PICKAXES</h3>
            <div id="tool-list"></div>
          </div>
          <div class="shop-section">
            <h3>UPGRADES</h3>
            <div id="upgrade-list"></div>
          </div>
        </div>
        <p class="shop-hint">Press <strong>E</strong> to close</p>
      </div>
    </div>

    <div id="start-overlay" class="overlay active">
      <div class="start-box">
        <h1>⛏ MINE DEEP</h1>
        <p class="tagline">3D Mining Simulator</p>
        <div class="help-grid">
          <span>WASD</span><span>Move</span>
          <span>Mouse</span><span>Look</span>
          <span>Left Click</span><span>Mine blocks</span>
          <span>Space</span><span>Jump</span>
          <span>Shift</span><span>Sprint</span>
          <span>E</span><span>Open shop</span>
        </div>
        <button id="play-btn" class="play-btn">CLICK TO PLAY</button>
      </div>
    </div>

    <div id="notif-area"></div>
    <div id="discovery" class="hidden"><div id="disc-text"></div></div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
